<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>TOEIC Vocabulary Quiz</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#a8edea,#fed6e3);
  user-select:none;
}

.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:20px;
}

h1{text-align:center;color:#ff6f91}

.question{
  margin-bottom:18px;
  padding:12px;
  border-radius:10px;
  border:2px solid #ddd;
  background:#fafafa;
}

.question.missing{
  border:2px solid red;
  background:#ffe6e6;
}

.answers label{
  display:block;
  padding:6px 0;
  cursor:pointer;
}

button{
  display:block;
  margin:20px auto;
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:#ff6f91;
  color:white;
  font-size:16px;
}

#result{
  text-align:center;
  font-size:20px;
  margin-top:20px;
}
</style>
</head>

<body oncopy="return false" oncontextmenu="return false">

<div class="container">

<h1>✨ TOEIC Vocabulary Quiz ✨</h1>

<div style="text-align:center;margin-bottom:15px;">
<input id="username" placeholder="Nhập tên..."
style="padding:10px;border-radius:20px;border:1px solid #ccc;width:60%;text-align:center;">
</div>

<form id="quiz"></form>

<button onclick="submitQuiz()">Nộp bài</button>

<div id="result"></div>

</div>

<script>

const questions = [
{q:"The worker had to ______ to pick up the box from the floor.", a:["bend over","kneel","spread","hang"], c:0},
{q:"Quỳ xuống trong tiếng Anh là gì?", a:["adjust","kneel","bend over","lean against"], c:1},
{q:"He was ______ the wall while talking on the phone.", a:["installing","stacking","placing","leaning against"], c:3},
{q:"Treo trong tiếng Anh là gì?", a:["spread","polish","hang","remove"], c:2},
{q:"The workers ______ the boxes in the storage room.", a:["stacked","spread","hung","adjusted"], c:0},
{q:"Lắp đặt trong tiếng Anh là gì?", a:["revise","inspect","submit","install"], c:3},
{q:"Please ______ the chair so it faces the screen.", a:["remove","adjust","replace","polish"], c:1},
{q:"Đánh bóng trong tiếng Anh là gì?", a:["repair","place","polish","spread"], c:2},
{q:"The waiter will ______ the napkins on the table.", a:["spread","stack","install","hang"], c:0},
{q:"Đặt trong tiếng Anh là gì?", a:["kneel","bend over","hang","place"], c:3},
{q:"He leaned on the ______ while watching the view.", a:["mat","railing","tray","ladder"], c:1},
{q:"Cái thang trong tiếng Anh là gì?", a:["frame","ladder","tray","bench"], c:1},
{q:"The waiter carried drinks on a ______.", a:["tray","mat","bench","railing"], c:0},
{q:"Ghế dài trong tiếng Anh là gì?", a:["tray","frame","bench","mat"], c:2},
{q:"The advertisement was displayed on a large ______.", a:["frame","tray","billboard","ladder"], c:2},
{q:"Lịch trình trong tiếng Anh là gì?", a:["schedule","reservation","itinerary","appointment"], c:0},
{q:"I have a doctor's ______ at 3 p.m.", a:["invoice","appointment","reservation","itinerary"], c:1},
{q:"Đặt chỗ trong tiếng Anh là gì?", a:["appointment","receipt","warranty","reservation"], c:3},
{q:"The travel agent prepared a detailed ______ for our trip.", a:["itinerary","receipt","item","invoice"], c:0},
{q:"Hóa đơn trong tiếng Anh là gì?", a:["shipment","warranty","invoice","receipt"], c:2},
{q:"The company shipped the ______ yesterday.", a:["merchandise","item","shipment","delivery"], c:2},
{q:"Nhà cung cấp trong tiếng Anh là gì?", a:["supplier","client","employee","customer"], c:0},
{q:"The ______ is responsible for managing the team.", a:["supplier","manager","customer","employee"], c:1},
{q:"Bảo trì trong tiếng Anh là gì?", a:["repair","maintenance","replace","remove"], c:1},
{q:"Please ______ the report before submitting it.", a:["inspect","approve","install","revise"], c:3}
];

const quiz=document.getElementById("quiz");

for(let i=0;i<questions.length;i++){
  let q=questions[i];
  let div=document.createElement("div");
  div.className="question";
  div.id="qbox"+i;

  let html=`<p><b>${i+1}. ${q.q}</b></p>`;

  for(let j=0;j<q.a.length;j++){
    html+=`
    <div class="answers">
      <label>
        <input type="radio" name="q${i}" value="${j}" onclick="removeRed(${i})">
        ${String.fromCharCode(65+j)}. ${q.a[j]}
      </label>
    </div>`;
  }

  div.innerHTML=html;
  quiz.appendChild(div);
}

function removeRed(i){
  document.getElementById("qbox"+i).classList.remove("missing");
}

function submitQuiz(){

  let name=document.getElementById("username").value.trim();

  if(name===""){
    alert("⚠️ Nhập tên trước!");
    return;
  }

  let allDone=true;

  for(let i=0;i<questions.length;i++){
    let selected=document.querySelector(`input[name=q${i}]:checked`);
    let box=document.getElementById("qbox"+i);

    if(!selected){
      box.classList.add("missing");
      allDone=false;
    }
  }

  if(!allDone){
    alert("⚠️ Làm hết câu rồi mới nộp!");
    return;
  }

  let score=0;

  for(let i=0;i<questions.length;i++){
    let q=questions[i];
    let selected=document.querySelector(`input[name=q${i}]:checked`);
    let options=document.getElementsByName("q"+i);

    options.forEach((opt,idx)=>{
      let label=opt.parentElement;

      if(idx===q.c){
        label.style.color="green";
        label.innerHTML+=" ✅";
      }

      if(opt.checked && idx!==q.c){
        label.style.color="red";
        label.innerHTML+=" ❌";
      }
    });

    if(parseInt(selected.value)===q.c) score++;
  }

  document.getElementById("result").innerHTML =
    `🎉 ${name} đúng ${score}/${questions.length} câu!`;

  fetch("https://script.google.com/macros/s/AKfycbwTTOMX6qSJF3d-LiCEdOAtyJAG365OE4ugBp_I8FTrK1w2_8xOqfoTWU7H6o3fN_4d/exec",{
    method:"POST",
    body:JSON.stringify({name,score})
  });
}

</script>

</body>
</html>
